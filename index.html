<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Pocket Gem - Diamond Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="font-body antialiased flex flex-col min-h-screen">

    <div class="bg-grid"></div>
    <div class="glow-orb" id="main-glow"></div>

    <header class="relative z-20 flex justify-between items-center p-4 md:px-8 border-b border-orange-500/20 bg-black/50 backdrop-blur-md">
        <div class="flex items-center gap-3 md:gap-5">
            <h1 class="font-gaming text-xl md:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-yellow-500 text-glow">
                FF Pocket Gem
            </h1>
            
            <div class="flex items-center gap-2 bg-green-900/40 border border-green-500/50 rounded-full px-3 py-1 mt-1 shadow-[0_0_10px_rgba(34,197,94,0.3)]">
                <span class="relative flex h-2.5 w-2.5">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                </span>
                <span class="text-xs font-bold text-green-400 tracking-wider">ACTIVE</span>
            </div>
        </div>

        <button id="menu-btn" class="text-orange-400 hover:text-orange-300 transition-colors focus:outline-none p-2 rounded-lg hover:bg-orange-500/10">
            <i data-lucide="menu" class="w-7 h-7"></i>
        </button>
    </header>

    <div id="overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 opacity-0 pointer-events-none hidden"></div>

    <div id="drawer" class="fixed top-0 right-0 w-64 md:w-80 h-full bg-black/95 border-l border-orange-500/30 z-40 transform translate-x-full shadow-[-10px_0_30px_rgba(255,136,0,0.1)] transition-transform duration-300 ease-in-out">
        <div class="p-5 flex justify-between items-center border-b border-orange-500/20">
            <div class="flex items-center gap-2">
                 <img src="https://dl.dir.freefiremobile.com/common/test/official/FREE_FIRE_LOGO.PNG(2).png" alt="FF" class="h-5 object-contain">
                <h2 class="font-gaming text-lg text-orange-400">মেনু</h2>
            </div>
            <button id="close-btn" class="text-gray-400 hover:text-white transition-colors p-1">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>
        <nav class="flex flex-col gap-2 p-4 mt-4">
            <a href="#" class="flex items-center gap-4 text-lg p-3 rounded-lg hover:bg-orange-600/20 text-gray-200 hover:text-orange-400 transition-all">
                <i data-lucide="home" class="w-5 h-5"></i>
                হোম
            </a>
            <a href="#" class="flex items-center gap-4 text-lg p-3 rounded-lg hover:bg-orange-600/20 text-gray-200 hover:text-orange-400 transition-all">
                <i data-lucide="help-circle" class="w-5 h-5"></i>
                কীভাবে ব্যবহার করবেন
            </a>
            <a href="#" class="flex items-center gap-4 text-lg p-3 rounded-lg hover:bg-orange-600/20 text-gray-200 hover:text-orange-400 transition-all">
                <i data-lucide="user" class="w-5 h-5"></i>
                অ্যাকাউন্ট
            </a>
        </nav>
        
        <div class="absolute bottom-5 left-0 w-full text-center">
            <p class="text-xs text-gray-500 font-gaming">v2.1.0 • System Online</p>
        </div>
    </div>

    <main class="relative z-10 flex flex-col items-center justify-center p-6 flex-grow mt-16 md:mt-20">
        
        <div class="relative w-full max-w-md">
            
            <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-[60%] z-30 floating-logo pointer-events-none">
                <img src="https://dl.dir.freefiremobile.com/common/test/official/FREE_FIRE_LOGO.PNG(2).png" alt="Free Fire Logo" class="h-20 md:h-24 object-contain drop-shadow-[0_0_20px_rgba(255,165,0,0.6)] filter brightness-110">
            </div>

            <div id="main-card" class="bg-gray-900/60 backdrop-blur-md border border-orange-500/30 rounded-2xl p-6 pt-12 shadow-[0_0_30px_rgba(255,136,0,0.1)] transition-colors duration-500">
                
                <div class="text-center mb-8">
                    <h2 class="font-gaming text-xl font-bold text-white mb-2">Gen-X <span id="mode-badge" class="text-green-500">Safe</span> Mode</h2>
                    <p class="text-gray-400 text-sm">আপনার প্লেয়ার আইডি দিন এবং ডায়মন্ড জেনারেট করুন</p>
                </div>

                <div class="space-y-5">
                    <div id="step-1" class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-300 mb-1 ml-1">Player ID (UID)</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i data-lucide="gamepad-2" class="w-5 h-5 text-gray-500"></i>
                                </div>
                                <input type="number" id="player-uid" placeholder="1234567890" class="w-full bg-black/50 border border-gray-700 focus:border-orange-500 text-white rounded-lg py-3 pl-10 pr-4 outline-none transition-colors shadow-inner">
                            </div>
                        </div>
                        
                        <button id="check-id-btn" class="w-full bg-blue-600/80 hover:bg-blue-500 text-white font-bold text-lg py-3 rounded-lg shadow-[0_0_15px_rgba(37,99,235,0.4)] transition-all transform hover:scale-[1.02] active:scale-95 flex justify-center items-center gap-2 border border-blue-500/50">
                            <i data-lucide="search" class="w-5 h-5"></i>
                            Verify ID
                        </button>
                        
                        <div id="status-msg" class="text-center text-sm font-bold hidden mt-2"></div>
                    </div>

                    <div id="step-2" class="space-y-4 hidden opacity-0 transition-opacity duration-500">
                        <div class="pt-2 border-t border-gray-800">
                            <label class="block text-sm text-gray-300 mb-2 ml-1">Account Safety Mode</label>
                            <div class="flex gap-3 mb-4">
                                <button id="btn-no-risk" class="flex flex-1 justify-center items-center gap-2 bg-green-600/20 border border-green-500 text-green-400 py-2 rounded-lg text-sm font-bold transition-all shadow-[0_0_10px_rgba(34,197,94,0.2)]">
                                    <i data-lucide="shield-check" class="w-4 h-4"></i> No Risk
                                </button>
                                <button id="btn-risk" class="flex flex-1 justify-center items-center gap-2 bg-black/50 border border-gray-700 text-gray-400 py-2 rounded-lg text-sm font-bold transition-all hover:border-red-500 hover:text-red-400">
                                    <i data-lucide="flame" class="w-4 h-4"></i> Risk
                                </button>
                            </div>

                            <label class="block text-sm text-gray-300 mb-1 ml-1 mt-2">Diamond Amount</label>
                            <select id="diamond-select" class="w-full bg-black/50 border border-gray-700 focus:border-orange-500 text-white rounded-lg py-3 px-4 outline-none transition-colors appearance-none shadow-inner">
                                </select>
                        </div>

                        <button id="generate-btn" class="w-full bg-gradient-to-r from-orange-600 to-yellow-500 hover:from-orange-500 hover:to-yellow-400 text-black font-bold text-lg py-3 rounded-lg shadow-[0_0_15px_rgba(255,165,0,0.4)] transition-all transform hover:scale-[1.02] active:scale-95 flex justify-center items-center gap-2">
                            <i data-lucide="zap" class="w-5 h-5"></i>
                            Generate Now
                        </button>
                    </div>
                    
                    <div id="step-3" class="hidden opacity-0 transition-opacity duration-500 space-y-4 pt-4 border-t border-gray-800">
                         <div class="flex justify-between items-center text-sm font-bold text-orange-400 mb-1" id="progress-header">
                             <span id="progress-text">Initializing...</span>
                             <span id="progress-percentage">0%</span>
                         </div>
                         <div class="w-full h-3 bg-gray-800 rounded-full overflow-hidden shadow-inner border border-gray-700">
                             <div id="progress-bar" class="h-full bg-gradient-to-r from-orange-600 to-yellow-400 rounded-full w-0"></div>
                         </div>
                         
                         <div id="terminal-output" class="bg-black/90 rounded-lg p-3 h-32 overflow-y-auto text-xs text-green-400 font-mono flex flex-col-reverse shadow-inner border border-gray-700 transition-all duration-500">
                             </div>

                         <button id="verify-human-btn" class="hidden w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold text-lg py-3 rounded-lg shadow-[0_0_15px_rgba(37,99,235,0.4)] transition-all transform hover:scale-[1.02] active:scale-95 flex justify-center items-center gap-2 animate-bounce">
                            <i data-lucide="user-check" class="w-5 h-5"></i>
                            Verify Human
                        </button>
                    </div>

                </div>
                
                <div class="mt-6 pt-4 border-t border-gray-800 text-center">
                    <p id="live-activity-text" class="text-xs text-gray-500 transition-opacity duration-300">সর্বশেষ জেনারেট: <span class="text-green-400">ID 458***</span> পেয়েছে 10,000 💎</p>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
